<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pure CSS Scroll Fade</title>
    <style>
      /* Spacers to give the page room to scroll */
      .spacer {
        height: 30vh;
        background: #f9f9f9;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
        color: #999;
      }

      /* Container to center our block */
      .block-container {
        height: 50vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f0f0f0;
      }

      /* The Box */
      .color-block {
        width: 250px;
        height: 250px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);

        /* 1. Tell it to watch the scrollbar */
        animation-timeline: scroll(root);

        /* 2. Link it to our color-change keyframes */
        animation-name: fadeToGreen;

        /* 3. Ensures it stays green at the end instead of snapping back to red */
        animation-fill-mode: both;

        /* 4. Start the transition exactly when the block begins moving up the viewport */
        animation-range: entry-crossing exit;
      }

      /* Defining the color transition */
      @keyframes fadeToGreen {
        from {
          background-color: rgb(255, 0, 0); /* Pure Red */
        }
        to {
          background-color: rgb(0, 128, 0); /* Pure Green */
        }
      }
    </style>
  </head>
  <body>
    <div class="spacer">
      <h2>Scroll down to see the magic ↓</h2>
    </div>

    <div class="block-container">
      <div class="color-block"></div>
    </div>

    <div class="spacer">
      <h2>End of page</h2>
    </div>
  </body>
</html>
